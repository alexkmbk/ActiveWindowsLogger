name: Build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:        # дозволяє запуск вручну та через REST API

jobs:
  build:
    runs-on: windows-latest   # VS 2022, MSVC v143, Windows SDK 10
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, x86]
        configuration: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild ActiveWindowsLogger.sln /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ActiveWindowsLogger-${{ matrix.platform }}-${{ matrix.configuration }}
          path: '**/ActiveWindowsLogger.exe'
          if-no-files-found: error
